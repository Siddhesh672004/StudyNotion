version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
      target: dev
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    depends_on:
      - mongo
    volumes:
      - ./server/src:/app/src
      - ./server/server.js:/app/server.js

  client:
    build:
      context: ./client
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public

volumes:
  mongo_data:
