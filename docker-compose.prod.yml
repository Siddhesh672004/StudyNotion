services:
  server:
    build:
      context: ./server
      target: prod
    env_file:
      - ./server/.env
    expose:
      - "4000"

  client:
    build:
      context: ./client
      target: prod
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - server
      - client
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
